services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.dev
    volumes:
      - .:/workspace:cached
      - app_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - next_cache:/workspace/apps/web/.next
    working_dir: /workspace
    command: sh -c "cd /workspace/apps/web && npx next dev --hostname 0.0.0.0"
    environment:
      DATABASE_URL: postgresql://hexacash:hexacash@postgres:5432/hexacash
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-in-production
      N8N_WEBHOOK_BASE_URL: ${N8N_WEBHOOK_BASE_URL:-http://localhost:5678}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-dev-n8n-secret}
    ports:
      - "4000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hexacash
      POSTGRES_PASSWORD: hexacash
      POSTGRES_DB: hexacash
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hexacash -d hexacash"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  app_node_modules:
  web_node_modules:
  next_cache:
